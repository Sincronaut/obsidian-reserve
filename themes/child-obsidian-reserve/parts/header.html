<!-- wp:group {"tagName":"header","className":"obsidian-site-header","style":{"spacing":{"padding":{"left":"var:preset|spacing|section-padding-h","right":"var:preset|spacing|section-padding-h"}}},"layout":{"type":"flex","flexWrap":"nowrap","justifyContent":"space-between","verticalAlignment":"center"}} -->
<header class="wp-block-group obsidian-site-header"
    style="padding-left:var(--wp--preset--spacing--section-padding-h);padding-right:var(--wp--preset--spacing--section-padding-h)">
    <!-- wp:html -->
    <a href="/" class="obsidian-logo-link">
        <img class="obsidian-site-logo-img" src="/wp-content/themes/child-obsidian-reserve/assets/images/logo.webp" alt="Obsidian Reserve">
    </a>
    <!-- /wp:html -->

    <!-- wp:html -->
    <div class="obsidian-nav-wrapper">
        <nav class="obsidian-nav">
            <ul style="list-style: none; margin: 0; padding: 0;">
                <li><a href="/">Home</a></li>
                [obsidian_locations_menu]
                <li><a href="/blog/">Blog</a></li>
                <li class="obsidian-dropdown">
                    <button class="obsidian-dropdown-toggle">Services <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
                    <ul class="obsidian-dropdown-menu">
                        <li><a href="/services/special-occasion/">Special Ocassion</a></li>
                        <li><a href="/services/airport-delivery/">Airport Delivery</a></li>
                        <li><a href="/services/business-rental/">Business Rental</a></li>
                        <li><a href="/services/long-term-rental/">Long term Rental</a></li>
                    </ul>
                </li>
                <li><a href="/fleet/">Fleet</a></li>
                <li><a href="/about-us/">About Us</a></li>
                <li><a href="/contact-us/">Contact Us</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <div class="wp-block-buttons header-reserve-btn">
                <div class="wp-block-button">
                    <a class="wp-block-button__link wp-element-button" href="#">Reserve a Vehicle</a>
                </div>
            </div>

            [obsidian_user_menu]
        </div>
    </div>

    <!-- Mobile Hamburger Toggle button & Backdrop Overlay -->
    <button class="obsidian-mobile-toggle" aria-label="Toggle site menu">
        <span></span><span></span><span></span>
    </button>
    <div class="obsidian-nav-overlay"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('.obsidian-mobile-toggle');
            const navWrapper = document.querySelector('.obsidian-nav-wrapper');
            const overlay = document.querySelector('.obsidian-nav-overlay');

            function toggleMobileMenu() {
                toggleBtn.classList.toggle('is-active');
                navWrapper.classList.toggle('is-active');
                overlay.classList.toggle('is-active');
                // Lock background scrolling when menu floats open
                document.body.style.overflow = navWrapper.classList.contains('is-active') ? 'hidden' : '';
            }

            if(toggleBtn) {
                toggleBtn.addEventListener('click', toggleMobileMenu);
                overlay.addEventListener('click', toggleMobileMenu);
            }

            // Dropdown logic
            const dropdownToggles = document.querySelectorAll('.obsidian-dropdown-toggle');
            
            dropdownToggles.forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const parent = toggle.closest('.obsidian-dropdown');
                    
                    // Close other dropdowns
                    document.querySelectorAll('.obsidian-dropdown').forEach(d => {
                        if (d !== parent) d.classList.remove('is-active');
                    });
                    
                    parent.classList.toggle('is-active');
                });
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.obsidian-dropdown')) {
                    document.querySelectorAll('.obsidian-dropdown.is-active').forEach(d => {
                        d.classList.remove('is-active');
                    });
                }
            });
        });
    </script>
    <!-- /wp:html -->
</header>
<!-- /wp:group -->
